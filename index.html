<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dukaan Dreams 🪔 — Khushi's Bazaar Empire</title>
<style>
  :root{
    --saffron:#FF9933; --marigold:#FFB627; --deep-pink:#E63E7C; --teal:#0F8B8D;
    --gold:#F5C518; --cream:#FFF8EC; --ink:#3A2618; --panel:#FFFFFF;
    --shadow:0 6px 18px rgba(58,38,24,0.15); --danger:#D64545; --ok:#2E9E5B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:
      radial-gradient(circle at 10% 10%, #FFE1B0 0%, transparent 40%),
      radial-gradient(circle at 90% 20%, #FFC1D9 0%, transparent 40%),
      linear-gradient(160deg,#FFF3DA 0%,#FFE3C2 40%,#FFD3E4 100%);
    color:var(--ink); min-height:100vh; padding-bottom:40px;
  }
  .topbar{
    background:linear-gradient(120deg,var(--deep-pink),var(--saffron)); color:#fff;
    padding:12px 20px; display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap; gap:10px; box-shadow:var(--shadow); position:sticky; top:0; z-index:50;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand img{width:36px;height:36px;object-fit:contain;filter:drop-shadow(0 2px 3px rgba(0,0,0,.25));}
  .brand h1{font-size:19px;margin:0;letter-spacing:0.5px;}
  .brand small{display:block;font-weight:400;opacity:0.9;font-size:11px;}
  .stats{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .stat-pill{
    background:rgba(255,255,255,0.22); border-radius:999px; padding:6px 12px;
    font-weight:700; font-size:13px; display:flex;align-items:center;gap:6px;
  }
  .stat-pill img{width:16px;height:16px;object-fit:contain;}
  .goal-wrap{display:flex;flex-direction:column;align-items:flex-start;min-width:130px;}
  .goal-track{width:130px;height:9px;background:rgba(255,255,255,0.35);border-radius:6px;overflow:hidden;margin-top:2px;}
  .goal-fill{height:100%;background:var(--gold);transition:width .3s;}
  .goal-label{font-size:10px;opacity:0.9;}

  .container{max-width:1150px;margin:0 auto;padding:16px;}

  .festival-banner{
    background:linear-gradient(90deg,var(--gold),var(--marigold)); color:var(--ink);
    border-radius:16px; padding:10px 18px; margin:14px 0; box-shadow:var(--shadow);
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;
    font-weight:600;font-size:13px;
  }
  .festival-banner button{
    background:var(--deep-pink);color:#fff;border:none;padding:8px 16px;border-radius:999px;
    font-weight:700;cursor:pointer;
  }

  .city-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-top:6px;align-items:center;}
  .city-tab{
    flex:0 0 auto; background:var(--panel); border:2px solid transparent; border-radius:14px;
    padding:10px 16px; cursor:pointer; font-weight:700; box-shadow:var(--shadow);
    white-space:nowrap; opacity:0.9; font-size:13px;
  }
  .city-tab.active{border-color:var(--deep-pink);background:linear-gradient(120deg,#fff,#FFE9D6);}
  .city-tab.locked{opacity:0.5;cursor:not-allowed;}
  .city-tab small{display:block;font-weight:400;font-size:10px;}
  .map-btn{
    flex:0 0 auto;background:linear-gradient(120deg,var(--teal),#0b6668);color:#fff;border:none;
    border-radius:14px;padding:10px 16px;font-weight:800;cursor:pointer;box-shadow:var(--shadow);font-size:13px;
  }

  .street-card{background:var(--panel);border-radius:20px;padding:18px;margin-top:14px;box-shadow:var(--shadow);}
  .street-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
  .street-title h2{margin:0;font-size:18px;}
  .street-title p{margin:2px 0 0;font-size:12px;color:#7a5c47;}
  .day-controls{display:flex;gap:8px;align-items:center;}
  .day-controls button{border:none;border-radius:999px;padding:8px 14px;font-weight:700;cursor:pointer;font-size:12px;}
  .btn-pause{background:#eee;color:var(--ink);}
  .btn-nextday{background:linear-gradient(120deg,var(--saffron),var(--deep-pink));color:#fff;}

  .street-scene{
    position:relative; border-radius:16px; overflow:hidden;
    background:linear-gradient(180deg,#BEE7F5 0%,#BEE7F5 42%,#F3D9AE 42%,#F3D9AE 76%,#7d7d86 76%,#7d7d86 100%);
    height:310px;
  }
  .skyline-img{
    position:absolute;left:0;right:0;top:0;height:46%;width:100%;
    object-fit:cover;object-position:bottom center;opacity:0.92;
  }
  .cloud{position:absolute;top:8px;font-size:24px;opacity:0.9;animation:drift 45s linear infinite;z-index:2;}
  @keyframes drift{ from{left:-10%;} to{left:110%;} }

  .shops-row{
    position:absolute; bottom:24%; left:0; height:190px; display:flex; gap:14px;
    padding-left:14px; align-items:flex-end; z-index:3;
  }
  .shop-slot{
    width:160px;height:190px;flex:0 0 auto;cursor:pointer;position:relative;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  }
  .shop-slot .shop-img{width:100%;height:140px;object-fit:contain;filter:drop-shadow(0 5px 5px rgba(0,0,0,0.28));}
  .shop-slot svg{width:100%;height:140px;filter:drop-shadow(0 4px 4px rgba(0,0,0,0.2));}
  .shop-label{
    background:#fff;border-radius:9px;padding:3px 8px;font-size:10.5px;font-weight:800;
    text-align:center;margin-top:5px;box-shadow:0 2px 6px rgba(0,0,0,.15);line-height:1.35;
    max-width:150px;
  }
  .tier-stars-label{color:var(--marigold);font-size:9.5px;display:block;}
  .cap-pill{
    position:absolute;top:-6px;right:6px;background:#fff;border:2px solid var(--danger);border-radius:999px;
    padding:1px 6px;font-size:10px;font-weight:800;color:var(--danger);box-shadow:0 2px 4px rgba(0,0,0,.15);z-index:4;
  }

  .sidewalk-actors{position:absolute;left:0;right:0;bottom:24%;height:190px;pointer-events:none;z-index:3;}
  .customer{position:absolute;bottom:2px;width:46px;height:66px;transition:left 0.1s linear;animation:walkbob 0.5s ease-in-out infinite alternate;}
  @keyframes walkbob{ from{transform:translateY(0);} to{transform:translateY(-3px);} }
  .customer img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3));}
  .bag-badge{position:absolute;top:-6px;right:-6px;font-size:15px;}

  .road{position:absolute;bottom:0;left:0;right:0;height:24%;z-index:2;}
  .road::before{content:"";position:absolute;top:50%;left:0;right:0;height:3px;background:repeating-linear-gradient(90deg,#fff 0 18px,transparent 18px 34px);opacity:.6;}
  .car{position:absolute;bottom:8px;width:76px;animation:carmove 8s linear infinite;}
  .car img{width:100%;filter:drop-shadow(0 3px 3px rgba(0,0,0,.3));}
  @keyframes carmove{ from{left:-14%;} to{left:110%;} }

  .panel-row{display:flex;gap:14px;margin-top:16px;flex-wrap:wrap;}
  .panel{background:var(--panel);border-radius:18px;padding:16px;box-shadow:var(--shadow);flex:1;min-width:270px;}
  .panel h3{margin:0 0 6px;font-size:15px;display:flex;align-items:center;gap:6px;}
  .panel h3 img{width:18px;height:18px;object-fit:contain;}
  .panel .hint{font-size:11px;color:#8a6a52;margin-bottom:8px;}
  .shop-list-item, .deco-list-item{display:flex;justify-content:space-between;align-items:center;padding:8px 6px;border-radius:10px;margin-bottom:4px;font-size:12.5px;}
  .shop-list-item:hover, .deco-list-item:hover{background:#FFF3E0;}
  .shop-list-item img.thumb, .deco-list-item img.thumb{width:30px;height:30px;object-fit:contain;margin-right:6px;vertical-align:middle;}
  .buy-btn{background:var(--teal);color:#fff;border:none;border-radius:999px;padding:6px 12px;font-weight:700;cursor:pointer;font-size:12px;}
  .buy-btn:disabled{background:#ccc;cursor:not-allowed;}

  .deco-owned-strip{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .deco-chip{background:#FFF3E0;border-radius:10px;padding:4px 6px;box-shadow:0 2px 5px rgba(0,0,0,0.08);}
  .deco-chip img{width:22px;height:22px;object-fit:contain;display:block;}

  .modal-overlay{position:fixed;inset:0;background:rgba(58,38,24,0.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
  .modal{background:#fff;border-radius:18px;padding:20px;max-width:380px;width:100%;box-shadow:0 12px 30px rgba(0,0,0,0.3);}
  .modal.wide{max-width:720px;}
  .modal h3{margin-top:0;}
  .modal .close-x{float:right;cursor:pointer;font-weight:900;font-size:18px;}
  .modal-btn{width:100%;padding:10px;border:none;border-radius:12px;background:var(--deep-pink);color:#fff;font-weight:700;cursor:pointer;margin-top:8px;font-size:14px;display:flex;align-items:center;gap:8px;justify-content:center;}
  .modal-btn img{width:28px;height:28px;object-fit:contain;}
  .modal-btn.secondary{background:#eee;color:var(--ink);}
  .modal-btn:disabled{background:#ddd;color:#999;cursor:not-allowed;}
  .stat-line{font-size:12.5px;color:#5a4636;margin:3px 0;}

  .map-wrap{position:relative;height:520px;background:linear-gradient(160deg,#FFE9C6,#FFD3E4);border-radius:16px;overflow:hidden;}
  .map-node{position:absolute;width:120px;text-align:center;cursor:pointer;transform:translate(-50%,-50%);}
  .map-node.locked{cursor:not-allowed;opacity:0.55;}
  .map-node .node-circle{
    width:64px;height:64px;border-radius:50%;margin:0 auto;background:linear-gradient(160deg,var(--gold),var(--saffron));
    display:flex;align-items:center;justify-content:center;box-shadow:0 6px 14px rgba(0,0,0,0.25);border:4px solid #fff;
  }
  .map-node .node-circle img{width:30px;height:30px;object-fit:contain;}
  .map-node.locked .node-circle{background:linear-gradient(160deg,#bbb,#999);}
  .map-node .node-circle .lock-emoji{font-size:22px;}
  .map-node .node-label{font-size:12px;font-weight:800;margin-top:6px;background:#fff;border-radius:8px;padding:3px 6px;display:inline-block;box-shadow:0 2px 5px rgba(0,0,0,.15);}
  .map-node .node-req{font-size:10px;color:#7a5c47;margin-top:2px;}

  .toast-wrap{position:fixed;bottom:16px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:200;}
  .toast{background:var(--ink);color:#fff;padding:10px 16px;border-radius:12px;font-size:13px;box-shadow:var(--shadow);animation:toastin .3s;max-width:260px;}
  @keyframes toastin{from{opacity:0;transform:translateX(20px);} to{opacity:1;transform:translateX(0);}}

  .footer-note{text-align:center;font-size:12px;color:#8a6a52;margin-top:24px;}
  .note-btn{background:none;border:1px solid #E7C79A;border-radius:999px;padding:6px 14px;cursor:pointer;font-size:12px;color:var(--ink);margin-top:6px;}
  ::-webkit-scrollbar{height:6px;}
  ::-webkit-scrollbar-thumb{background:#E7C79A;border-radius:4px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <img src="assets/ui/diya.png" alt="logo">
    <div><h1>Dukaan Dreams</h1><small id="subtitle">Khushi's Bazaar Empire</small></div>
  </div>
  <div class="stats">
    <div class="stat-pill"><img src="assets/ui/coin.png"> <span id="moneyStat">0</span></div>
    <div class="goal-wrap">
      <span class="goal-label">Day <span id="dayStat">1</span> Goal: ₹<span id="goalStat">0</span></span>
      <div class="goal-track"><div class="goal-fill" id="goalFill" style="width:0%;"></div></div>
    </div>
    <div class="stat-pill"><img src="assets/ui/star.png"> <span id="repStat">0</span></div>
    <div class="stat-pill">⏱️ <span id="timerStat">40</span>s</div>
  </div>
</div>

<div class="container">
  <div id="festivalBanner" style="display:none;" class="festival-banner"></div>

  <div class="city-tabs" id="cityTabs">
    <button class="map-btn" id="mapBtn">🗺️ World Map</button>
  </div>

  <div class="street-card">
    <div class="street-title">
      <div><h2 id="cityName">—</h2><p id="cityDesc"></p></div>
      <div class="day-controls">
        <button class="btn-pause" id="pauseBtn">⏸ Pause</button>
        <button class="btn-nextday" id="nextDayBtn">Next Day ▶</button>
      </div>
    </div>

    <div class="street-scene" id="streetScene">
      <img class="skyline-img" id="skylineImg" src="" alt="">
      <span class="cloud" style="left:10%; top:8px;">☁️</span>
      <span class="cloud" style="left:55%; top:22px; animation-delay:-15s;">☁️</span>
      <div class="shops-row" id="shopsRow"></div>
      <div class="sidewalk-actors" id="sidewalkActors"></div>
      <div class="road" id="road"></div>
    </div>

    <div class="deco-owned-strip" id="decoOwnedStrip"></div>
  </div>

  <div class="panel-row">
    <div class="panel">
      <h3>🏪 Build a Shop</h3>
      <p class="hint">Order matters! Fast & cheap shops early catch more customers before their money runs out.</p>
      <div id="shopShopList"></div>
    </div>
    <div class="panel">
      <h3>🎨 Street Boosters</h3>
      <p class="hint">These change customer flow, not just looks.</p>
      <div id="decoShopList"></div>
    </div>
    <div class="panel">
      <h3><img src="assets/ui/trophy.png"> Achievements</h3>
      <div id="achList" style="font-size:13px;"></div>
    </div>
  </div>

  <div class="footer-note">
    Built with love by Kunj for Khushi 💕
    <br>
    <button class="note-btn" id="noteBtn">💌 A little note</button>
  </div>
</div>

<div id="modalRoot"></div>
<div class="toast-wrap" id="toastWrap"></div>

<script>
/* ============================= CONFIG ============================= */
const PLAYER_NAME = "Khushi";
const STEP = 174;
const SPAWN_BASE_MS = 1700;
const DAY_DURATION_S = 40;
const TICK_MS = 100;

/* ============================= DATA ============================= */
const SHOP_TYPES = {
  chai:      {name:"Chai Tapri",       emoji:"☕", img:"chai.png",       baseCost:40,  tiers:[{cap:2,dwell:2.0,price:8},{cap:3,dwell:1.6,price:14,upgradeCost:80},{cap:4,dwell:1.3,price:22,upgradeCost:200}]},
  vadapav:   {name:"Vada Pav Cart",    emoji:"🥪", img:"vadapav.png",    baseCost:70,  tiers:[{cap:2,dwell:2.5,price:14},{cap:3,dwell:2.0,price:24,upgradeCost:140},{cap:4,dwell:1.6,price:38,upgradeCost:320}]},
  chaat:     {name:"Chaat Corner",     emoji:"🍛", img:"chaat.png",      baseCost:100, tiers:[{cap:2,dwell:3.0,price:18},{cap:3,dwell:2.4,price:30,upgradeCost:180},{cap:4,dwell:2.0,price:48,upgradeCost:380}]},
  kulfi:     {name:"Kulfi Cart",       emoji:"🍨", img:"kulfi.png",      baseCost:90,  tiers:[{cap:2,dwell:2.2,price:12},{cap:3,dwell:1.8,price:20,upgradeCost:160},{cap:4,dwell:1.5,price:32,upgradeCost:340}]},
  mithai:    {name:"Mithai Shop",      emoji:"🍬", img:"mithai.png",     baseCost:220, tiers:[{cap:3,dwell:3.5,price:35},{cap:4,dwell:3.0,price:60,upgradeCost:400},{cap:5,dwell:2.5,price:95,upgradeCost:800}]},
  saree:     {name:"Saree Boutique",   emoji:"🥻", img:"saree.png",      baseCost:350, tiers:[{cap:2,dwell:5.0,price:70},{cap:3,dwell:4.2,price:120,upgradeCost:650},{cap:4,dwell:3.5,price:190,upgradeCost:1300}]},
  jewel:     {name:"Johari Jewellery", emoji:"💍", img:"jewel.png",      baseCost:600, tiers:[{cap:2,dwell:6.0,price:130},{cap:3,dwell:5.0,price:220,upgradeCost:1100},{cap:3,dwell:4.0,price:340,upgradeCost:2200}]},
  spice:     {name:"Spice Stall",      emoji:"🌶️", img:"spice.png",      baseCost:160, tiers:[{cap:2,dwell:2.8,price:22},{cap:3,dwell:2.3,price:36,upgradeCost:300},{cap:4,dwell:1.9,price:56,upgradeCost:600}]},
  handicraft:{name:"Handicraft Shop",  emoji:"🏺", img:"handicraft.png", baseCost:300, tiers:[{cap:2,dwell:4.0,price:45},{cap:3,dwell:3.3,price:75,upgradeCost:550},{cap:4,dwell:2.8,price:115,upgradeCost:1100}]},
  book:      {name:"Bookstall",        emoji:"📚", img:"book.png",       baseCost:150, tiers:[{cap:2,dwell:3.2,price:20},{cap:3,dwell:2.6,price:34,upgradeCost:280},{cap:4,dwell:2.2,price:54,upgradeCost:560}]},
};

const DECORATIONS = {
  bench:    {name:"Street Bench",       img:"bench.png",     cost:70,  desc:"-8% customer walking speed (they linger longer)", effect:{speedPct:-0.08}, maxStack:3},
  newsstand:{name:"Newsstand",          img:"newsstand.png", cost:90,  desc:"-6% speed + small passive income", effect:{speedPct:-0.06, idleIncome:1.5}, maxStack:3},
  music:    {name:"Music Ads",          img:"music.png",     cost:150, desc:"+20% customer spawn rate", effect:{spawnPct:0.20}, maxStack:3},
  busstop:  {name:"Bus Stop",           img:"busstop.png",   cost:300, desc:"Every 9s, a busload of 3 customers arrives", effect:{burst:true}, maxStack:1},
  rangoli:  {name:"Rangoli Mat",        img:"rangoli.png",   cost:80,  desc:"+10% customer spawn rate", effect:{spawnPct:0.10}, maxStack:2},
  diya:     {name:"Diya Lights",        img:"diya.png",      cost:120, desc:"-5% speed, feels festive", effect:{speedPct:-0.05}, maxStack:2},
};

const CITIES = [
  {id:"mumbai",  name:"Mumbai Chowpatty Lane", desc:"Where every dream in the bazaar business begins.", unlockRep:0,    slots:6, shops:["chai","vadapav","chaat","kulfi"], moneyRange:[40,90],   mapPos:[14,78]},
  {id:"delhi",   name:"Delhi Chandni Chowk",   desc:"Glittering lanes of silk and spice.",              unlockRep:600,  slots:7, shops:["saree","jewel","mithai","spice","chai"], moneyRange:[70,150], mapPos:[32,55]},
  {id:"jaipur",  name:"Jaipur Johari Bazaar",  desc:"The Pink City's jewel of jewel-markets.",           unlockRep:1500, slots:7, shops:["jewel","handicraft","saree","chai"], moneyRange:[90,190], mapPos:[55,68]},
  {id:"kolkata", name:"Kolkata College Street",desc:"Books, sweets, and adda over cutting chai.",        unlockRep:2800, slots:7, shops:["book","mithai","chai","chaat"], moneyRange:[60,130],  mapPos:[70,40]},
  {id:"kochi",   name:"Kochi Spice Market",    desc:"The scent of cardamom drifts down the backwaters.", unlockRep:4500, slots:8, shops:["spice","handicraft","kulfi","vadapav"], moneyRange:[80,170], mapPos:[50,20]},
  {id:"goa",     name:"Goa Night Market",      desc:"The grand finale — every stall, every flavour.",    unlockRep:7000, slots:9, shops:Object.keys(SHOP_TYPES), moneyRange:[120,260], mapPos:[80,12]},
];

const FESTIVALS = [
  {id:"diwali",  name:"Diwali Dhamaka",  emoji:"🪔", boost:["mithai","jewel"],   mult:2,   durationDays:3, minDay:5,  cooldown:12},
  {id:"holi",    name:"Holi Rang Utsav", emoji:"🎨", boost:["kulfi","chaat"],    mult:2,   durationDays:2, minDay:10, cooldown:12},
  {id:"wedding", name:"Wedding Season",  emoji:"💍", boost:["saree","jewel"],    mult:1.8, durationDays:4, minDay:15, cooldown:14},
];

const ACHIEVEMENTS = [
  {id:"first_shop", label:"First Dukaan!", test:s=>Object.values(s.cities).some(c=>c.slots.some(p=>p)) },
  {id:"first_perfect", label:"First Perfect Day (goal hit!)", test:s=>s.perfectDays>=1 },
  {id:"rich_5000",  label:"₹5,000 earned lifetime", test:s=>s.lifetimeEarned>=5000 },
  {id:"rich_25000", label:"₹25,000 earned lifetime", test:s=>s.lifetimeEarned>=25000 },
  {id:"rep_1000",   label:"1,000 reputation", test:s=>s.reputation>=1000 },
  {id:"festival_1", label:"First festival hosted", test:s=>s.festivalsHosted>=1 },
  {id:"all_cities", label:"Unlocked every city!", test:s=>CITIES.every(c=>s.reputation>=c.unlockRep) },
  {id:"streak_5",   label:"5 Perfect Days in a row", test:s=>s.perfectStreak>=5 },
];

const CUSTOMER_COUNT = 7;

/* ============================= STORAGE ============================= */
const SAVE_KEY = "dukaan_dreams_save_v4";
const MemStore = {};
function storageSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){ MemStore[k]=v; } }
function storageGet(k){ try{ return localStorage.getItem(k); }catch(e){ return MemStore[k]||null; } }

/* ============================= STATE ============================= */
function freshState(){
  const cities = {};
  CITIES.forEach(c=>{ cities[c.id] = { slots:new Array(c.slots).fill(null), decos:{} }; });
  return {
    money:150, reputation:0, day:1, dayCash:0, dayGoal: computeGoal(1,0),
    perfectDays:0, perfectStreak:0, lifetimeEarned:0, festivalsHosted:0,
    currentCity:"mumbai", activeFestival:null, festivalCooldowns:{}, unlockedAch:[], cities
  };
}
function computeGoal(day, cityIdx){ return Math.round(120 + (day-1)*22 + cityIdx*80); }

let state = loadState();
function loadState(){
  const raw = storageGet(SAVE_KEY);
  if(!raw) return freshState();
  try{
    const parsed = JSON.parse(raw);
    const fresh = freshState();
    CITIES.forEach(c=>{
      if(!parsed.cities[c.id]) parsed.cities[c.id] = fresh.cities[c.id];
      if(parsed.cities[c.id].slots.length < c.slots){
        while(parsed.cities[c.id].slots.length < c.slots) parsed.cities[c.id].slots.push(null);
      }
      if(!parsed.cities[c.id].decos) parsed.cities[c.id].decos = {};
    });
    return Object.assign(fresh, parsed);
  }catch(e){ return freshState(); }
}
function saveState(){ storageSet(SAVE_KEY, JSON.stringify(state)); }

let customers = [];
let custIdSeq = 1;
let paused = false;
let dayTimer = DAY_DURATION_S;
let spawnAcc = 0;
let burstAcc = 0;

/* ============================= HELPERS ============================= */
function cityDef(id){ return CITIES.find(c=>c.id===id); }
function cityIndex(id){ return CITIES.findIndex(c=>c.id===id); }
function currentCityDef(){ return cityDef(state.currentCity); }
function currentCityState(){ return state.cities[state.currentCity]; }
function fmt(n){ return Math.round(n).toLocaleString('en-IN'); }

function isFestivalActiveFor(shopId){
  if(!state.activeFestival) return null;
  const fest = FESTIVALS.find(f=>f.id===state.activeFestival.id);
  if(fest && fest.boost.includes(shopId)) return fest;
  return null;
}

function cityModifiers(){
  const decos = currentCityState().decos;
  let speedPct = 0, spawnPct = 0, idleIncome = 0, hasBurst=false;
  Object.entries(decos).forEach(([id,count])=>{
    const d = DECORATIONS[id];
    if(!d || !count) return;
    if(d.effect.speedPct) speedPct += d.effect.speedPct*count;
    if(d.effect.spawnPct) spawnPct += d.effect.spawnPct*count;
    if(d.effect.idleIncome) idleIncome += d.effect.idleIncome*count;
    if(d.effect.burst) hasBurst = true;
  });
  speedPct = Math.max(speedPct, -0.5);
  return {speedPct, spawnPct, idleIncome, hasBurst};
}

function toast(msg){
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}

function checkAchievements(){
  ACHIEVEMENTS.forEach(a=>{
    if(!state.unlockedAch.includes(a.id) && a.test(state)){
      state.unlockedAch.push(a.id);
      toast("🏆 Achievement: "+a.label);
    }
  });
}

/* ============================= RENDER ============================= */
function render(){
  document.getElementById('subtitle').textContent = PLAYER_NAME + "'s Bazaar Empire";
  document.getElementById('moneyStat').textContent = fmt(state.money);
  document.getElementById('repStat').textContent = fmt(state.reputation);
  document.getElementById('dayStat').textContent = state.day;
  document.getElementById('goalStat').textContent = fmt(state.dayGoal);
  document.getElementById('timerStat').textContent = Math.ceil(dayTimer);
  document.getElementById('goalFill').style.width = Math.min(100, state.dayCash/state.dayGoal*100)+'%';

  renderFestivalBanner();
  renderCityTabs();
  document.getElementById('skylineImg').src = `assets/skylines/${state.currentCity}.jpg`;
  renderRoad();
  renderShopsRow();
  renderShopList();
  renderDecoList();
  renderDecoOwnedStrip();
  renderAchievements();
}

function renderRoad(){
  const road = document.getElementById('road');
  road.innerHTML = `
    <div class="car" style="animation-delay:0s;"><img src="assets/vehicles/car.png"></div>
    <div class="car" style="animation-delay:-4s;"><img src="assets/vehicles/rickshaw.png"></div>`;
}

function renderFestivalBanner(){
  const el = document.getElementById('festivalBanner');
  if(state.activeFestival){
    const fest = FESTIVALS.find(f=>f.id===state.activeFestival.id);
    el.style.display='flex';
    el.innerHTML = `<span>${fest.emoji} <b>${fest.name}</b> is live! ${fest.mult}x price on ${fest.boost.map(s=>SHOP_TYPES[s].name).join(' & ')} — ends Day ${state.activeFestival.endsDay}.</span>`;
  } else {
    const next = FESTIVALS.find(f=> state.day >= f.minDay && (!state.festivalCooldowns[f.id] || state.day >= state.festivalCooldowns[f.id]) );
    if(next){
      el.style.display='flex';
      el.innerHTML = `<span>${next.emoji} <b>${next.name}</b> is ready to begin!</span><button onclick="startFestival('${next.id}')">Start Festival</button>`;
    } else { el.style.display='none'; }
  }
}

function renderCityTabs(){
  const wrap = document.getElementById('cityTabs');
  wrap.innerHTML = '<button class="map-btn" id="mapBtn">🗺️ World Map</button>';
  document.getElementById('mapBtn').onclick = openWorldMap;
  CITIES.forEach(c=>{
    const unlocked = state.reputation >= c.unlockRep;
    const div = document.createElement('div');
    div.className = 'city-tab' + (c.id===state.currentCity?' active':'') + (!unlocked?' locked':'');
    div.innerHTML = `${c.name}<small>${unlocked? (c.slots+' shop slots') : ('🔒 needs ⭐'+fmt(c.unlockRep))}</small>`;
    if(unlocked){ div.onclick = ()=>{ switchCity(c.id); }; }
    wrap.appendChild(div);
  });
}

function switchCity(id){
  state.currentCity = id;
  customers = [];
  document.getElementById('sidewalkActors').innerHTML = '';
  state.dayGoal = computeGoal(state.day, cityIndex(id));
  render();
}

function openWorldMap(){
  let nodes = '';
  CITIES.forEach((c,i)=>{
    const unlocked = state.reputation >= c.unlockRep;
    const [x,y] = c.mapPos;
    nodes += `<div class="map-node ${unlocked?'':'locked'}" style="left:${x}%;top:${y}%;" onclick="${unlocked? `switchCity('${c.id}');closeModal();` : ''}">
      <div class="node-circle">${unlocked? `<img src="assets/ui/diya.png">` : `<span class="lock-emoji">🔒</span>`}</div>
      <div class="node-label">${c.name.split(' ')[0]}</div>
      <div class="node-req">${unlocked? (state.currentCity===c.id?'You are here':'Tap to visit') : 'needs ⭐'+fmt(c.unlockRep)}</div>
    </div>`;
  });
  let path = '<svg class="map-path" viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0;">';
  for(let i=0;i<CITIES.length-1;i++){
    const [x1,y1]=CITIES[i].mapPos, [x2,y2]=CITIES[i+1].mapPos;
    path += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#E7C79A" stroke-width="1" stroke-dasharray="2,2"/>`;
  }
  path += '</svg>';
  showModal(`<h3><span class="close-x" onclick="closeModal()">✕</span>🗺️ Choose Your Bazaar</h3>
    <div class="map-wrap">${path}${nodes}</div>`, true);
}

function renderShopsRow(){
  const cdef = currentCityDef();
  const cs = currentCityState();
  document.getElementById('cityName').textContent = cdef.name;
  document.getElementById('cityDesc').textContent = cdef.desc;

  const row = document.getElementById('shopsRow');
  row.innerHTML = '';
  cs.slots.forEach((placed, idx)=>{
    const slot = document.createElement('div');
    slot.className = 'shop-slot';
    if(placed){
      const type = SHOP_TYPES[placed.shopId];
      const tierInfo = type.tiers[placed.tier];
      const occ = placed.occupancy||0;
      const stars = '★'.repeat(placed.tier+1)+'☆'.repeat(type.tiers.length-1-placed.tier);
      slot.innerHTML = `<div class="cap-pill">${occ}/${tierInfo.cap}</div>
        <img class="shop-img" src="assets/shops/${type.img}" alt="${type.name}">
        <div class="shop-label">${type.name}<span class="tier-stars-label">${stars}</span></div>`;
      slot.onclick = ()=>openShopModal(idx);
    } else {
      slot.innerHTML = emptyLotSVG(idx+1);
      slot.onclick = ()=>openBuildModal(idx);
    }
    row.appendChild(slot);
  });
}

function renderShopList(){
  const cdef = currentCityDef();
  const wrap = document.getElementById('shopShopList');
  wrap.innerHTML = '';
  cdef.shops.forEach(shopId=>{
    const type = SHOP_TYPES[shopId];
    const row = document.createElement('div');
    row.className = 'shop-list-item';
    row.innerHTML = `<span><img class="thumb" src="assets/shops/${type.img}"> ${type.name} <br><small>₹${fmt(type.baseCost)} · cap ${type.tiers[0].cap} · ₹${type.tiers[0].price}/visit</small></span>`;
    const btn = document.createElement('button');
    btn.className='buy-btn';
    btn.textContent='Build';
    const hasSlot = currentCityState().slots.includes(null);
    btn.disabled = state.money < type.baseCost || !hasSlot;
    btn.onclick = ()=>{
      const emptyIdx = currentCityState().slots.findIndex(p=>p===null);
      if(emptyIdx===-1){ toast("No empty slots left here!"); return; }
      buildShop(emptyIdx, shopId);
    };
    row.appendChild(btn);
    wrap.appendChild(row);
  });
}

function renderDecoList(){
  const wrap = document.getElementById('decoShopList');
  wrap.innerHTML = '';
  const owned = currentCityState().decos;
  Object.entries(DECORATIONS).forEach(([id,d])=>{
    const count = owned[id]||0;
    const row = document.createElement('div');
    row.className = 'deco-list-item';
    row.innerHTML = `<span><img class="thumb" src="assets/decorations/${d.img}"> ${d.name} ${count?('x'+count):''}<br><small>₹${fmt(d.cost)} · ${d.desc}</small></span>`;
    const btn = document.createElement('button');
    btn.className='buy-btn';
    btn.textContent='Buy';
    btn.disabled = state.money < d.cost || count>=d.maxStack;
    btn.onclick = ()=>{
      if(state.money < d.cost || count>=d.maxStack) return;
      state.money -= d.cost;
      owned[id] = count+1;
      toast(`Placed ${d.name}!`);
      checkAchievements();
      saveState(); render();
    };
    row.appendChild(btn);
    wrap.appendChild(row);
  });
}

function renderDecoOwnedStrip(){
  const owned = currentCityState().decos;
  const wrap = document.getElementById('decoOwnedStrip');
  let html = '';
  Object.entries(owned).forEach(([id,count])=>{
    if(count>0){ for(let i=0;i<count;i++) html += `<span class="deco-chip" title="${DECORATIONS[id].name}"><img src="assets/decorations/${DECORATIONS[id].img}"></span>`; }
  });
  wrap.innerHTML = html;
}

function renderAchievements(){
  const wrap = document.getElementById('achList');
  wrap.innerHTML = ACHIEVEMENTS.map(a=>{
    const got = state.unlockedAch.includes(a.id);
    return `<div style="opacity:${got?1:0.4};padding:4px 0;">${got?'✅':'⬜'} ${a.label}</div>`;
  }).join('');
}

/* ============================= ACTIONS ============================= */
function buildShop(idx, shopId){
  const type = SHOP_TYPES[shopId];
  if(state.money < type.baseCost) return;
  state.money -= type.baseCost;
  currentCityState().slots[idx] = {shopId, tier:0, occupancy:0};
  toast(`Opened a new ${type.name}! ${type.emoji}`);
  checkAchievements();
  saveState(); render();
}

function openBuildModal(idx){
  const cdef = currentCityDef();
  const options = cdef.shops.map(shopId=>{
    const t = SHOP_TYPES[shopId];
    const affordable = state.money >= t.baseCost;
    return `<button class="modal-btn ${affordable?'':'secondary'}" ${affordable?'':'disabled'} onclick="buildShop(${idx},'${shopId}');closeModal();">
      <img src="assets/shops/${t.img}"> ${t.name} — ₹${fmt(t.baseCost)} <small>(cap ${t.tiers[0].cap}, ₹${t.tiers[0].price}/visit)</small>
    </button>`;
  }).join('');
  showModal(`<h3><span class="close-x" onclick="closeModal()">✕</span>Build on Slot ${idx+1}</h3>
    <p style="font-size:13px;color:#7a5c47;">Tip: place fast, cheap shops toward the start of the street so more customers still have money left when they reach your pricier ones later.</p>
    ${options}`);
}

function openShopModal(idx){
  const placed = currentCityState().slots[idx];
  const type = SHOP_TYPES[placed.shopId];
  const tierInfo = type.tiers[placed.tier];
  const nextTier = type.tiers[placed.tier+1];
  let html = `<h3><span class="close-x" onclick="closeModal()">✕</span>${type.emoji} ${type.name}</h3>
    <p class="stat-line">Tier ${placed.tier+1} of ${type.tiers.length} — Slot ${idx+1}</p>
    <p class="stat-line">Capacity: ${tierInfo.cap} customers at once</p>
    <p class="stat-line">Dwell time: ${tierInfo.dwell}s per visit</p>
    <p class="stat-line">Price: ₹${tierInfo.price} per customer</p>`;
  if(nextTier){
    html += `<button class="modal-btn" ${state.money<nextTier.upgradeCost?'disabled':''} onclick="upgradeShop(${idx});closeModal();">⬆️ Upgrade — ₹${fmt(nextTier.upgradeCost)} (cap ${nextTier.cap}, ₹${nextTier.price}/visit)</button>`;
  } else {
    html += `<p style="font-size:12px;color:#7a5c47;">🌟 Maxed out! This shop is at its best.</p>`;
  }
  html += `<button class="modal-btn secondary" onclick="sellShop(${idx});closeModal();">Sell shop (refund 50%)</button>`;
  showModal(html);
}

function upgradeShop(idx){
  const placed = currentCityState().slots[idx];
  const type = SHOP_TYPES[placed.shopId];
  const nextTier = type.tiers[placed.tier+1];
  if(!nextTier || state.money < nextTier.upgradeCost) return;
  state.money -= nextTier.upgradeCost;
  placed.tier += 1;
  toast(`${type.name} upgraded to tier ${placed.tier+1}! ⭐`);
  checkAchievements();
  saveState(); render();
}

function sellShop(idx){
  const placed = currentCityState().slots[idx];
  const type = SHOP_TYPES[placed.shopId];
  let refund = type.baseCost*0.5;
  for(let i=1;i<=placed.tier;i++) refund += type.tiers[i].upgradeCost*0.5;
  state.money += refund;
  currentCityState().slots[idx] = null;
  toast(`Sold ${type.name} for ₹${fmt(refund)}`);
  saveState(); render();
}

function startFestival(festId){
  const fest = FESTIVALS.find(f=>f.id===festId);
  state.activeFestival = {id:festId, endsDay: state.day + fest.durationDays};
  state.festivalsHosted += 1;
  toast(`${fest.emoji} ${fest.name} has begun!`);
  checkAchievements();
  saveState(); render();
}

/* ============================= SIMULATION ============================= */
function spawnCustomer(){
  const cdef = currentCityDef();
  const [lo,hi] = cdef.moneyRange;
  customers.push({
    id: custIdSeq++, x: -20,
    money: Math.round(lo + Math.random()*(hi-lo)),
    state: 'walking', slotIndex: null, dwellRemaining: 0, visited: new Set(),
    variant: Math.floor(Math.random()*CUSTOMER_COUNT),
    boughtSomething:false
  });
}

function simTick(dtSec){
  const mods = cityModifiers();
  const cs = currentCityState();
  const baseSpeed = 55;
  const speed = baseSpeed * (1+mods.speedPct);

  spawnAcc += dtSec*1000;
  const interval = SPAWN_BASE_MS / (1+mods.spawnPct);
  if(spawnAcc >= interval){
    spawnAcc = 0;
    if(Math.random() < 0.85) spawnCustomer();
  }
  if(mods.hasBurst){
    burstAcc += dtSec*1000;
    if(burstAcc >= 9000){
      burstAcc = 0;
      spawnCustomer(); spawnCustomer(); spawnCustomer();
      toast("🚌 A busload of customers arrived!");
    }
  }

  if(mods.idleIncome>0){
    const gain = mods.idleIncome*dtSec;
    state.money += gain; state.dayCash += gain; state.lifetimeEarned += gain;
  }

  const streetWidthPx = cs.slots.length*STEP + 80;

  customers.forEach(c=>{
    if(c.state==='walking'){
      c.x += speed*dtSec;
      const slotIdx = Math.floor(c.x/STEP);
      if(slotIdx>=0 && slotIdx<cs.slots.length){
        const placed = cs.slots[slotIdx];
        if(placed && !c.visited.has(slotIdx) && c.money>0){
          const type = SHOP_TYPES[placed.shopId];
          const tierInfo = type.tiers[placed.tier];
          if((placed.occupancy||0) < tierInfo.cap){
            placed.occupancy = (placed.occupancy||0)+1;
            c.state = 'inshop'; c.slotIndex = slotIdx;
            c.dwellRemaining = tierInfo.dwell; c.visited.add(slotIdx);
          }
        }
      }
    } else if(c.state==='inshop'){
      c.dwellRemaining -= dtSec;
      if(c.dwellRemaining<=0){
        const placed = cs.slots[c.slotIndex];
        if(placed){
          const type = SHOP_TYPES[placed.shopId];
          const tierInfo = type.tiers[placed.tier];
          const fest = isFestivalActiveFor(placed.shopId);
          const mult = fest?fest.mult:1;
          const pay = Math.min(c.money, tierInfo.price*mult);
          c.money -= pay;
          state.money += pay; state.dayCash += pay; state.lifetimeEarned += pay;
          placed.occupancy = Math.max(0,(placed.occupancy||0)-1);
          c.boughtSomething = true;
        }
        c.state = 'walking';
      }
    }
  });

  customers = customers.filter(c=> c.x < streetWidthPx);
}

function renderActors(){
  const wrap = document.getElementById('sidewalkActors');
  const existing = {};
  wrap.querySelectorAll('.customer').forEach(el=>{ existing[el.dataset.id]=el; });
  const seen = new Set();
  customers.forEach(c=>{
    seen.add(String(c.id));
    let el = existing[c.id];
    if(!el){
      el = document.createElement('div');
      el.className='customer';
      el.dataset.id = c.id;
      el.innerHTML = `<img src="assets/customers/customer-${c.variant+1}.png"><span class="bag-badge" style="display:none;">🛍️</span>`;
      wrap.appendChild(el);
    }
    el.style.left = c.x+'px';
    const bag = el.querySelector('.bag-badge');
    if(bag) bag.style.display = c.boughtSomething ? 'block' : 'none';
  });
  Object.keys(existing).forEach(id=>{ if(!seen.has(id)) existing[id].remove(); });
}

/* ============================= DAY CYCLE ============================= */
function endDay(){
  const metGoal = state.dayCash >= state.dayGoal;
  const repGain = Math.round(state.dayCash/6) + (metGoal?60:0);
  state.reputation += repGain;
  if(metGoal){ state.perfectDays += 1; state.perfectStreak += 1; }
  else { state.perfectStreak = 0; }

  showModal(`<h3>📅 Day ${state.day} Complete</h3>
    <p class="stat-line">Earned today: ₹${fmt(state.dayCash)} / Goal ₹${fmt(state.dayGoal)}</p>
    <p class="stat-line">${metGoal? '🌟 Perfect day! +'+repGain+' reputation':'Reputation +'+repGain}</p>
    <button class="modal-btn" onclick="beginNextDay();closeModal();">Start Day ${state.day+1} ▶</button>`);

  if(state.activeFestival && state.day >= state.activeFestival.endsDay){
    const fest = FESTIVALS.find(f=>f.id===state.activeFestival.id);
    state.festivalCooldowns[fest.id] = state.day + fest.cooldown;
    state.activeFestival = null;
  }
  checkAchievements();
  saveState();
}

function beginNextDay(){
  state.day += 1;
  state.dayCash = 0;
  state.dayGoal = computeGoal(state.day, cityIndex(state.currentCity));
  dayTimer = DAY_DURATION_S;
  customers = [];
  document.getElementById('sidewalkActors').innerHTML='';
  saveState();
  render();
}

document.getElementById('nextDayBtn').onclick = ()=>{ endDay(); };
document.getElementById('pauseBtn').onclick = ()=>{
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused? '▶ Resume':'⏸ Pause';
};
document.getElementById('mapBtn').onclick = openWorldMap;

/* ============================= MODAL ============================= */
function showModal(innerHtml, wide){
  const root = document.getElementById('modalRoot');
  root.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal${wide?' wide':''}">${innerHtml}</div></div>`;
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

/* ============================= NOTE ============================= */
document.getElementById('noteBtn').onclick = ()=>{
  showModal(`<h3><span class="close-x" onclick="closeModal()">✕</span>💌 For Khushi</h3>
  <p style="font-size:14px;line-height:1.6;">
  I built this whole bazaar just for you — every chai stall, every diya, every little jingle of coins.
  Grow it, decorate it, take it through every festival. Hope it makes you smile as much as you make me smile. 🌸
  </p>
  <button class="modal-btn" onclick="closeModal()">🥰</button>`);
};

/* ============================= MAIN LOOP ============================= */
render();
setInterval(()=>{
  if(paused) return;
  simTick(TICK_MS/1000);
  dayTimer -= TICK_MS/1000;
  if(dayTimer<=0){ dayTimer = 0; endDay(); }
  document.getElementById('moneyStat').textContent = fmt(state.money);
  document.getElementById('timerStat').textContent = Math.ceil(dayTimer);
  document.getElementById('goalFill').style.width = Math.min(100, state.dayCash/state.dayGoal*100)+'%';
  renderActors();
  renderShopsRow();
}, TICK_MS);
setInterval(saveState, 5000);
</script>
